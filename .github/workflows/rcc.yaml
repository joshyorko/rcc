name: Rcc
on:
  push:
    branches:
      - main

    tags:
      - "v*" # Run when a new version tag (e.g., v18.5.0) is pushed
    paths-ignore:
      - ".github/workflows/**"
      - ".dagger/**"

  pull_request:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/**"
      - ".dagger/**"

permissions:
  contents: read

jobs:
  build:
    name: Build RCC
    runs-on: ubuntu-latest
    # Build only for trusted version tag pushes.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      # Checkout first so setup-go can locate go.mod/go.sum for caching
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26.4"
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
      - name: Install invoke
        run: python -m pip install invoke==2.2.0
      - name: Show commit info
        run: inv what
      - name: Debug Build Job
        run: |
          echo "GitHub ref: ${{ github.ref }}"
          echo "GitHub event name: ${{ github.event_name }}"
          echo "Job status: ${{ job.status }}"
      - name: Build RCC
        run: inv build
      - name: Prepare Artifacts
        run: |
          mkdir -p rcc-builds
          cp build/linux64/rcc rcc-builds/rcc-linux64
          cp build/linux64/rccremote rcc-builds/rccremote-linux64
          cp build/windows64/rcc.exe rcc-builds/rcc-windows64.exe
          cp build/windows64/rccremote.exe rcc-builds/rccremote-windows64.exe
          cp build/macos64/rcc rcc-builds/rcc-macos64
          cp build/macos64/rccremote rcc-builds/rccremote-macos64
          cp build/macosarm64/rcc rcc-builds/rcc-macosarm64
          cp build/macosarm64/rccremote rcc-builds/rccremote-macosarm64
      - name: Upload RCC Binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: RCC-Binaries
          path: rcc-builds/

  robot:
    name: Robot Tests
    runs-on: ${{ matrix.os }}
    # Only run tests on push to main or PRs, not on release workflows
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      # Checkout first so setup-go can locate go.mod/go.sum for caching
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26.4"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
      - name: Install invoke
        run: python -m pip install invoke==2.2.0
      - name: Setup Robot Environment
        run: inv robotsetup
      - name: Show commit info
        run: inv what
      - name: Run Robot Framework Tests
        run: inv robot
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: success() || failure()
        with:
          name: ${{ matrix.os }}-test-reports
          path: ./tmp/output/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
    # Only run this job on tag pushes (e.g., refs/tags/v18.5.0)
    # Robot tests run on push to main, so code is already validated before release
    # Grant only the permissions needed to publish a release
    permissions:
      contents: write

    steps:
      - name: Debug Release Job
        run: |
          echo "GitHub ref: ${{ github.ref }}"
          echo "GitHub event name: ${{ github.event_name }}"
          echo "Build job status: ${{ needs.build.result }}"
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Download Built RCC Binaries
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: RCC-Binaries
          path: rcc-builds/
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
      - name: Generate index.json
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          export DATE=$(date +"%d.%-m.%Y")

          # Try to fetch existing index.json from latest release
          curl -sL "https://github.com/${REPO}/releases/latest/download/index.json" -o existing.json 2>/dev/null || echo '{"tested":[],"edge":[]}' > existing.json

          # Generate new index.json with this version prepended
          python3 << 'PYEOF'
          import json
          import os

          version = os.environ["VERSION"]
          date = os.environ.get("DATE", "")
          repo = os.environ["REPO"]

          # Load existing or create new
          try:
              with open('existing.json') as f:
                  data = json.load(f)
          except:
              data = {"tested": [], "edge": []}

          # Build download URLs for GitHub releases
          base_url = f"https://github.com/{repo}/releases/download/{version}"
          # Generate changelog anchor (v18.12.0 -> v18120)
          changelog_anchor = version.replace(".", "")

          new_entry = {
              "version": version,
              "when": date,
              "changelog": f"https://github.com/{repo}/blob/main/docs/changelog.md#{changelog_anchor}",
              "windows": f"{base_url}/rcc-windows64.exe",
              "linux": f"{base_url}/rcc-linux64",
              "macos": f"{base_url}/rcc-darwin64"
          }

          # Remove duplicate if exists
          data["tested"] = [v for v in data.get("tested", []) if v["version"] != version]

          # Prepend new version
          data["tested"] = [new_entry] + data["tested"]

          # Keep last 20 versions
          data["tested"] = data["tested"][:20]

          with open('rcc-builds/index.json', 'w') as f:
              json.dump(data, f, indent=1)

          print(f"Generated index.json with {len(data['tested'])} versions")
          PYEOF

          cat rcc-builds/index.json
      - name: Validate release tag
        id: validate_tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+)*([-.][0-9A-Za-z]+)*$ ]]; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Create Draft Release with Assets
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8
        with:
          files: rcc-builds/*
          tag_name: ${{ steps.validate_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: true
          prerelease: false

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.validate_tag.outputs.tag }}
        run: |
          echo "Publishing draft release $TAG..."
          gh release edit "$TAG" --draft=false
          echo "Release $TAG is now public"

      - name: Validate Homebrew Update Token
        env:
          HOMEBREW_TOOLS_PAT: ${{ secrets.HOMEBREW_TOOLS_PAT }}
        run: |
          if [[ -z "$HOMEBREW_TOOLS_PAT" ]]; then
            echo "HOMEBREW_TOOLS_PAT is required to dispatch the Homebrew tap update."
            exit 1
          fi

      - name: Trigger Homebrew Cask Update
        uses: actions/github-script@v8.0.0
        with:
          github-token: ${{ secrets.HOMEBREW_TOOLS_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: 'homebrew-tools',
              workflow_id: 'tap-auto-update.yml',
              ref: 'main',
              inputs: {
                slot_id: 'rcc-daily'
              }
            });
