name: Compression Profiling

on:
  workflow_dispatch:
    inputs:
      run_heavy:
        description: 'Run heavy environment tests (slower)'
        required: false
        default: true
        type: boolean
  pull_request:
    branches:
      - main
    paths:
      - 'htfs/**'
      - 'conda/**'
      - 'common/version.go'

permissions:
  contents: read

jobs:
  profile:
    name: Profile ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Need full history to checkout main
      
      - uses: actions/setup-go@v6
        with:
          go-version: "1.20.x"
          
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install invoke
        run: python -m pip install invoke

      - name: Setup Robot Environment
        run: inv robotsetup

      - name: Create output directories
        shell: bash
        run: mkdir -p tmp/profiles tmp/output

      # ============================================
      # BUILD AND PROFILE MAIN BRANCH (GZIP BASELINE)
      # ============================================
      - name: Checkout main branch
        shell: bash
        run: |
          git checkout main
          echo "## 📊 Compression Comparison: main (gzip) vs PR (zstd)" >> $GITHUB_STEP_SUMMARY

      - name: Build main branch RCC
        run: |
          inv assets
          inv local

      - name: Show main RCC version
        shell: bash
        run: |
          echo "### Main Branch (gzip baseline)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./build/rcc version >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Clean holotree for main
        shell: bash
        run: |
          ./build/rcc ht delete main-small --controller profiling 2>/dev/null || true
          ./build/rcc ht delete main-medium --controller profiling 2>/dev/null || true
          ./build/rcc config cleanup --controller profiling 2>/dev/null || true

      - name: Main - Small env fresh build
        shell: bash
        run: |
          START=$(date +%s)
          ./build/rcc ht vars --space main-small --controller profiling robot_tests/conda.yaml 2>&1 | tee tmp/profiles/main-small-fresh.log
          END=$(date +%s)
          echo "MAIN_SMALL_FRESH=$((END - START))" >> $GITHUB_ENV

      - name: Main - Small env restore
        shell: bash
        run: |
          ./build/rcc ht delete main-small --controller profiling
          START=$(date +%s)
          ./build/rcc ht vars --space main-small --controller profiling robot_tests/conda.yaml 2>&1 | tee tmp/profiles/main-small-restore.log
          END=$(date +%s)
          echo "MAIN_SMALL_RESTORE=$((END - START))" >> $GITHUB_ENV

      - name: Main - Medium env fresh build
        shell: bash
        run: |
          START=$(date +%s)
          ./build/rcc ht vars --space main-medium --controller profiling robot_tests/profile_conda_medium.yaml 2>&1 | tee tmp/profiles/main-medium-fresh.log || true
          END=$(date +%s)
          echo "MAIN_MEDIUM_FRESH=$((END - START))" >> $GITHUB_ENV

      - name: Main - Medium env restore
        shell: bash
        run: |
          ./build/rcc ht delete main-medium --controller profiling 2>/dev/null || true
          START=$(date +%s)
          ./build/rcc ht vars --space main-medium --controller profiling robot_tests/profile_conda_medium.yaml 2>&1 | tee tmp/profiles/main-medium-restore.log || true
          END=$(date +%s)
          echo "MAIN_MEDIUM_RESTORE=$((END - START))" >> $GITHUB_ENV

      - name: Cleanup main holotree
        shell: bash
        run: |
          ./build/rcc ht delete main-small --controller profiling 2>/dev/null || true
          ./build/rcc ht delete main-medium --controller profiling 2>/dev/null || true
          ./build/rcc config cleanup --controller profiling 2>/dev/null || true

      # ============================================
      # BUILD AND PROFILE PR BRANCH (ZSTD)
      # ============================================
      - name: Checkout PR branch
        shell: bash
        run: git checkout ${{ github.head_ref || github.ref_name }}

      - name: Build PR branch RCC
        run: |
          inv assets
          inv local

      - name: Show PR RCC version
        shell: bash
        run: |
          echo "### PR Branch (zstd)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./build/rcc version >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Clean holotree for PR
        shell: bash
        run: |
          ./build/rcc ht delete pr-small --controller profiling 2>/dev/null || true
          ./build/rcc ht delete pr-medium --controller profiling 2>/dev/null || true
          ./build/rcc config cleanup --controller profiling 2>/dev/null || true

      - name: PR - Small env fresh build
        shell: bash
        run: |
          START=$(date +%s)
          ./build/rcc ht vars --space pr-small --controller profiling robot_tests/conda.yaml 2>&1 | tee tmp/profiles/pr-small-fresh.log
          END=$(date +%s)
          echo "PR_SMALL_FRESH=$((END - START))" >> $GITHUB_ENV

      - name: PR - Small env restore
        shell: bash
        run: |
          ./build/rcc ht delete pr-small --controller profiling
          START=$(date +%s)
          ./build/rcc ht vars --space pr-small --controller profiling robot_tests/conda.yaml 2>&1 | tee tmp/profiles/pr-small-restore.log
          END=$(date +%s)
          echo "PR_SMALL_RESTORE=$((END - START))" >> $GITHUB_ENV

      - name: PR - Medium env fresh build
        shell: bash
        run: |
          START=$(date +%s)
          ./build/rcc ht vars --space pr-medium --controller profiling robot_tests/profile_conda_medium.yaml 2>&1 | tee tmp/profiles/pr-medium-fresh.log
          END=$(date +%s)
          echo "PR_MEDIUM_FRESH=$((END - START))" >> $GITHUB_ENV

      - name: PR - Medium env restore
        shell: bash
        run: |
          ./build/rcc ht delete pr-medium --controller profiling
          START=$(date +%s)
          ./build/rcc ht vars --space pr-medium --controller profiling robot_tests/profile_conda_medium.yaml 2>&1 | tee tmp/profiles/pr-medium-restore.log
          END=$(date +%s)
          echo "PR_MEDIUM_RESTORE=$((END - START))" >> $GITHUB_ENV

      # ============================================
      # COMPARISON SUMMARY TABLE
      # ============================================
      - name: Generate comparison table
        shell: bash
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚡ Performance Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Operation | main (gzip) | PR (zstd) | Δ |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----------|-------------|-----------|---|" >> $GITHUB_STEP_SUMMARY
          
          # Small fresh
          DIFF=$((MAIN_SMALL_FRESH - PR_SMALL_FRESH))
          if [ $DIFF -gt 0 ]; then ICON="🟢 -${DIFF}s"; else ICON="🔴 +$((-DIFF))s"; fi
          echo "| Small | Fresh build | ${MAIN_SMALL_FRESH}s | ${PR_SMALL_FRESH}s | $ICON |" >> $GITHUB_STEP_SUMMARY
          
          # Small restore
          DIFF=$((MAIN_SMALL_RESTORE - PR_SMALL_RESTORE))
          if [ $DIFF -gt 0 ]; then ICON="🟢 -${DIFF}s"; elif [ $DIFF -eq 0 ]; then ICON="⚪ 0s"; else ICON="🔴 +$((-DIFF))s"; fi
          echo "| Small | **Restore** | ${MAIN_SMALL_RESTORE}s | ${PR_SMALL_RESTORE}s | $ICON |" >> $GITHUB_STEP_SUMMARY
          
          # Medium fresh
          DIFF=$((MAIN_MEDIUM_FRESH - PR_MEDIUM_FRESH))
          if [ $DIFF -gt 0 ]; then ICON="🟢 -${DIFF}s"; else ICON="🔴 +$((-DIFF))s"; fi
          echo "| Medium | Fresh build | ${MAIN_MEDIUM_FRESH}s | ${PR_MEDIUM_FRESH}s | $ICON |" >> $GITHUB_STEP_SUMMARY
          
          # Medium restore  
          DIFF=$((MAIN_MEDIUM_RESTORE - PR_MEDIUM_RESTORE))
          if [ $DIFF -gt 0 ]; then ICON="🟢 -${DIFF}s"; elif [ $DIFF -eq 0 ]; then ICON="⚪ 0s"; else ICON="🔴 +$((-DIFF))s"; fi
          echo "| Medium | **Restore** | ${MAIN_MEDIUM_RESTORE}s | ${PR_MEDIUM_RESTORE}s | $ICON |" >> $GITHUB_STEP_SUMMARY

      # ============================================
      # HEAVY ENVIRONMENT PROFILING (optional)
      # ============================================
      - name: Profile heavy env - Fresh build
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_heavy != false }}
        shell: bash
        run: |
          echo "## Heavy Environment (data science stack)" >> $GITHUB_STEP_SUMMARY
          echo "### Fresh Build" >> $GITHUB_STEP_SUMMARY
          
          START=$(date +%s)
          ./build/rcc ht vars --space profile-heavy \
            --controller profiling \
            robot_tests/profile_conda_heavy.yaml 2>&1 | tee tmp/profiles/heavy-fresh.log
          END=$(date +%s)
          
          echo "- **Fresh build time**: $((END - START))s" >> $GITHUB_STEP_SUMMARY

      - name: Profile heavy env - Restore
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_heavy != false }}
        shell: bash
        run: |
          echo "### Restore from Hololib" >> $GITHUB_STEP_SUMMARY
          
          ./build/rcc ht delete profile-heavy --controller profiling
          
          START=$(date +%s)
          ./build/rcc ht vars --space profile-heavy \
            --controller profiling \
            robot_tests/profile_conda_heavy.yaml 2>&1 | tee tmp/profiles/heavy-restore.log
          END=$(date +%s)
          
          echo "- **Restore time**: $((END - START))s" >> $GITHUB_STEP_SUMMARY

      # ============================================
      # VERIFY ZSTD COMPRESSION
      # ============================================
      - name: Verify zstd compression
        shell: bash
        run: |
          echo "## Compression Verification" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            HOLOLIB_PATH="$LOCALAPPDATA/robocorp/hololib"
          else
            HOLOLIB_PATH="$HOME/.robocorp/hololib"
          fi
          
          echo "Checking files in: $HOLOLIB_PATH"
          
          if [ -d "$HOLOLIB_PATH" ]; then
            ZSTD_COUNT=0
            GZIP_COUNT=0
            OTHER_COUNT=0
            TOTAL=0
            
            for f in $(find "$HOLOLIB_PATH" -type f 2>/dev/null | head -100); do
              TOTAL=$((TOTAL + 1))
              MAGIC=$(xxd -l 4 -p "$f" 2>/dev/null || echo "error")
              if [[ "$MAGIC" == "28b52ffd" ]]; then
                ZSTD_COUNT=$((ZSTD_COUNT + 1))
              elif [[ "$MAGIC" == "1f8b"* ]]; then
                GZIP_COUNT=$((GZIP_COUNT + 1))
              else
                OTHER_COUNT=$((OTHER_COUNT + 1))
              fi
            done
            
            echo "| Format | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| zstd | $ZSTD_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| gzip (legacy) | $GZIP_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| other/catalog | $OTHER_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total sampled** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            
            if [[ $ZSTD_COUNT -gt 0 && $GZIP_COUNT -eq 0 ]]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "✅ **All compressed files are using zstd!**" >> $GITHUB_STEP_SUMMARY
            elif [[ $GZIP_COUNT -gt 0 ]]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **Found legacy gzip files** - this may be expected if reading old cache" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Hololib directory not found at $HOLOLIB_PATH" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Holotree statistics
        shell: bash
        run: |
          echo "## Holotree Statistics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./build/rcc ht stats --controller profiling >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload profiling artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: profiling-${{ matrix.os }}
          path: tmp/profiles/
          retention-days: 30

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          ./build/rcc ht delete main-small --controller profiling 2>/dev/null || true
          ./build/rcc ht delete main-medium --controller profiling 2>/dev/null || true
          ./build/rcc ht delete pr-small --controller profiling 2>/dev/null || true
          ./build/rcc ht delete pr-medium --controller profiling 2>/dev/null || true
          ./build/rcc ht delete profile-heavy --controller profiling 2>/dev/null || true
          ./build/rcc config cleanup --controller profiling 2>/dev/null || true
